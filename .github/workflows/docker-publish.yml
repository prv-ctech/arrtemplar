name: Publish Docker image

"on":
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
      - "*.*.*"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
      security-events: write
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      IMAGE_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate registry configuration
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${DOCKERHUB_USERNAME:-}" ]]; then
            echo "Missing repository variable DOCKERHUB_USERNAME" >&2
            exit 1
          fi

          if [[ -z "${IMAGE_REPOSITORY:-}" ]]; then
            echo "Missing repository variable DOCKERHUB_REPOSITORY" >&2
            exit 1
          fi

          if [[ -z "${DOCKERHUB_TOKEN:-}" ]]; then
            echo "Missing repository secret DOCKERHUB_TOKEN" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=Arrtemplar
            org.opencontainers.image.description=Production-ready Bun monorepo template for Arrbit projects.
            org.opencontainers.image.licenses=MIT

      - name: Build amd64 scan image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: arrtemplar:scan-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan amd64 runtime image with Trivy
        id: trivy_amd64
        continue-on-error: ${{ github.ref_type == 'branch' && github.ref_name != 'main' }}
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: arrtemplar:scan-amd64
          format: sarif
          output: trivy-results-amd64.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Build arm64 scan image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          outputs: type=oci,dest=/tmp/arrtemplar-scan-arm64.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan arm64 runtime image with Trivy
        id: trivy_arm64
        continue-on-error: ${{ github.ref_type == 'branch' && github.ref_name != 'main' }}
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          input: /tmp/arrtemplar-scan-arm64.tar
          format: sarif
          output: trivy-results-arm64.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Detect Trivy SARIF outputs
        id: trivy_outputs
        run: |
          set -euo pipefail

          if [[ -f trivy-results-amd64.sarif ]]; then
            echo "amd64_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "amd64_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -f trivy-results-arm64.sarif ]]; then
            echo "arm64_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "arm64_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload amd64 Trivy results
        if: always() && steps.trivy_outputs.outputs.amd64_exists == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-amd64.sarif

      - name: Upload arm64 Trivy results
        if: always() && steps.trivy_outputs.outputs.arm64_exists == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-arm64.sarif

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true